<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Baseline Bar & Grille – LED Ad</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .ad {
    width: 800px;
    height: 400px;
    position: relative;
    overflow: hidden;
    background: #000;
  }

  .ad-bg { position: absolute; inset: 0; display: flex; }
  .ad-bg .left-panel {
    width: 390px;
    flex-shrink: 0;
    background: #000;
    position: relative;
  }
  .ad-bg .left-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 10% 50%, rgba(220,30,30,0.10) 0%, transparent 70%);
  }
  .ad-bg .right-panel {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #080000;
  }
  .ad-bg .right-panel::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #000 0%, rgba(0,0,0,0.55) 18%, rgba(0,0,0,0.15) 42%, transparent 65%);
    z-index: 2;
    pointer-events: none;
  }
  .ad-bg .ember {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(0deg, #000 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
    z-index: 3;
    pointer-events: none;
  }
  #frameCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    pointer-events: none;
    filter: brightness(0.82) contrast(1.18) saturate(1.15);
  }

  /* LED scanline overlay — on top of everything */
  .ad::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      transparent, transparent 2px,
      rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 3px);
    pointer-events: none;
    z-index: 100;
  }

  /* Layers on top of background */
  .layers { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
  .layer  { position: absolute; line-height: 1; }
  .layer .text-inner { white-space: pre; display: inline-block; }
  .layer.framed .text-inner {
    border: 3px solid rgba(220,30,30,0.85);
    border-radius: 6px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.72);
    box-shadow: 0 0 24px rgba(220,30,30,0.5), 0 0 60px rgba(220,30,30,0.2), inset 0 0 20px rgba(220,30,30,0.08);
  }
  .layer img { display: block; }

  /* Ticker */
  .ticker-bar {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 36px;
    background: #cc1a1a;
    display: flex;
    align-items: center;
    overflow: hidden;
    border-top: 2px solid #e02020;
    box-shadow: 0 -4px 20px rgba(220,30,30,0.35);
    z-index: 20;
  }
  .ticker-bar.hidden { display: none; }
  .ticker-bar-inner {
    display: flex;
    white-space: nowrap;
    animation: ticker-scroll 30s linear infinite;
  }
  .ticker-bar-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: #fff;
    padding: 0 60px;
    white-space: nowrap;
  }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
</style>
</head>
<body>

<div class="ad">
  <div class="ad-bg">
    <div class="left-panel"></div>
    <div class="right-panel">
      <canvas id="frameCanvas"></canvas>
      <div class="ember"></div>
    </div>
  </div>
  <div class="layers" id="layers"></div>
  <div class="ticker-bar" id="tickerBar">
    <div class="ticker-bar-inner" id="tickerInner"></div>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   FRAME PLAYER
═══════════════════════════════════════════ */
const BASE_URL    = 'https://pickletester.github.io/test-ad/Frames/';
const FRAME_COUNT = 145;
const FPS         = 18;
const INTERVAL_MS = 1000 / FPS;
const canvas = document.getElementById('frameCanvas');
const ctx    = canvas.getContext('2d');
function sizeCanvas() {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  canvas.width  = w > 0 ? w : 410;
  canvas.height = h > 0 ? h : 400;
}
requestAnimationFrame(() => { sizeCanvas(); window.addEventListener('resize', sizeCanvas); startLoading(); });
function frameUrl(n) {
  return `${BASE_URL}Gen-4_5_-_burger_in_fire_gen-4_5_-_burger_in_fire__1__${String(n).padStart(3,'0')}.jpg`;
}
const frames = new Array(FRAME_COUNT).fill(null);
let loopStarted = false;
function startLoopIfNeeded() { if (!loopStarted && frames[0]) { loopStarted = true; requestAnimationFrame(tick); } }
function startLoading() {
  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    img.onload  = () => { frames[i] = img; startLoopIfNeeded(); };
    img.onerror = () => { startLoopIfNeeded(); };
    img.src = frameUrl(i + 1);
  }
}
function drawFrame(img) {
  if (!img) return;
  const cw = canvas.width, ch = canvas.height;
  const iw = img.naturalWidth || 1, ih = img.naturalHeight || 1;
  const scale = Math.max(cw / iw, ch / ih);
  const dw = iw * scale, dh = ih * scale;
  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(img, (cw - dw) / 2, (ch - dh) * 0.25, dw, dh);
}
let frameIdx = 0, lastTime = 0;
function tick(ts) {
  requestAnimationFrame(tick);
  if (ts - lastTime < INTERVAL_MS) return;
  lastTime = ts;
  let safeIdx = frameIdx;
  for (let i = 0; i < FRAME_COUNT; i++) {
    const idx = (frameIdx + i) % FRAME_COUNT;
    if (frames[idx]) { safeIdx = idx; break; }
  }
  drawFrame(frames[safeIdx]);
  frameIdx = (safeIdx + 1) % FRAME_COUNT;
}

/* ═══════════════════════════════════════════
   LAYERS + TICKER — live from lower-third.json
═══════════════════════════════════════════ */
const POLL_MS = 30000;
let lastJson  = '';
const layersEl    = document.getElementById('layers');
const tickerBarEl = document.getElementById('tickerBar');
const tickerInner = document.getElementById('tickerInner');

const DEFAULT_LAYERS = [
  { id: 'brand', type: 'text', text: 'BASELINE\nBAR & GRILLE',
    x: 20, y: 110, fontFamily: 'bebas', fontSize: 72, color: '#ffffff',
    letterSpacing: 1, lineHeight: 0.88, textAlign: 'center', width: 370, frame: false,
    textShadow: '2px 3px 8px rgba(0,0,0,0.8)' },
  { id: 'inside', type: 'text', text: 'INSIDE',
    x: 110, y: 270, fontFamily: 'barlow', fontSize: 21, color: '#ffffff',
    letterSpacing: 4, lineHeight: 1, textAlign: 'left', fontWeight: 700, width: 0, frame: false },
  { id: 'levelup', type: 'image',
    src: 'https://pickletester.github.io/test-ad/Logo%20LevelUP.png',
    x: 210, y: 262, width: 100, height: 42 },
  { id: 'public', type: 'text', text: 'OPEN\nTO THE\nPUBLIC',
    x: 620, y: 22, fontFamily: 'bebas', fontSize: 32, color: '#ffffff',
    letterSpacing: 3, lineHeight: 1, textAlign: 'center', width: 0, frame: true,
    textShadow: '0 0 16px rgba(255,50,50,0.7), 0 0 40px rgba(255,50,50,0.3)' }
];
const DEFAULT_TICKER = { enabled: true, text: '' };

function fontStack(f) {
  if (f === 'bebas')  return "'Bebas Neue', sans-serif";
  if (f === 'barlow') return "'Barlow Condensed', sans-serif";
  if (f === 'serif')  return "Georgia, serif";
  return "system-ui, sans-serif";
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function fetchData() {
  try {
    const res = await fetch(`lower-third.json?v=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) return;
    const raw = await res.text();
    if (raw === lastJson) return;
    lastJson = raw;
    render(JSON.parse(raw));
  } catch(e) {}
}

function render(data) {
  // ── Resolve layers + ticker (supports v2 + legacy) ──
  let layers = null;
  let ticker = null;

  if (data && data.version === 2 && Array.isArray(data.layers)) {
    layers = data.layers;
    ticker = data.ticker || DEFAULT_TICKER;
  } else if (data) {
    // Legacy: build info-block layers from blocks, keep defaults for brand/public/inside
    layers = JSON.parse(JSON.stringify(DEFAULT_LAYERS));
    const blocks = data.blocks || [
      { label: data.leftLabel,   value: data.leftValue   },
      { label: data.centerLabel, value: data.centerValue },
      { label: data.rightLabel,  value: data.rightValue  }
    ].filter(b => b && (b.label || b.value));
    const colX = [40, 290, 540, 640];
    blocks.forEach((b, i) => {
      const x = colX[i] ?? (40 + i * 170);
      layers.push({
        id: 'lblegacy_l_' + i, type: 'text', text: b.label || '',
        x, y: 305, fontFamily: 'barlow', fontSize: 10, color: '#e02020',
        letterSpacing: 4, lineHeight: 1, textAlign: 'left', fontWeight: 700, width: 0, frame: false
      });
      layers.push({
        id: 'lblegacy_v_' + i, type: 'text', text: b.value || '',
        x, y: 322, fontFamily: 'bebas', fontSize: 24, color: '#ffffff',
        letterSpacing: 2, lineHeight: 1, textAlign: 'left', width: 0, frame: false
      });
    });
    ticker = { enabled: true, text: (typeof data.ticker === 'string' ? data.ticker : (data.ticker?.text || '')) };
  } else {
    layers = DEFAULT_LAYERS;
    ticker = DEFAULT_TICKER;
  }

  renderLayers(layers);
  renderTicker(ticker);
}

function renderLayers(layers) {
  layersEl.innerHTML = '';
  layers.forEach(l => {
    const div = document.createElement('div');
    div.className = 'layer' + (l.frame ? ' framed' : '');
    div.style.left = (l.x || 0) + 'px';
    div.style.top  = (l.y || 0) + 'px';

    if (l.type === 'image') {
      const img = document.createElement('img');
      img.src = l.src || '';
      img.style.width  = (l.width  || 100) + 'px';
      img.style.height = (!l.height || l.height === 0) ? 'auto' : l.height + 'px';
      div.appendChild(img);
    } else {
      const inner = document.createElement('div');
      inner.className = 'text-inner';
      inner.style.fontFamily    = fontStack(l.fontFamily);
      inner.style.fontSize      = (l.fontSize || 24) + 'px';
      inner.style.color         = l.color || '#ffffff';
      inner.style.letterSpacing = (l.letterSpacing || 0) + 'px';
      inner.style.lineHeight    = (l.lineHeight || 1);
      inner.style.textAlign     = l.textAlign || 'left';
      inner.style.fontWeight    = l.fontWeight || 400;
      if (l.width && l.width > 0) inner.style.width = l.width + 'px';
      if (l.textShadow) inner.style.textShadow = l.textShadow;
      inner.textContent = l.text || '';
      div.appendChild(inner);
    }
    layersEl.appendChild(div);
  });
}

function renderTicker(t) {
  const enabled = t && t.enabled !== false;
  const text = (t && t.text) || '';
  tickerBarEl.classList.toggle('hidden', !enabled || !text.trim());
  if (!text.trim()) { tickerInner.innerHTML = ''; return; }
  tickerInner.innerHTML =
    `<span class="ticker-bar-text">${esc(text)}</span>` +
    `<span class="ticker-bar-text">${esc(text)}</span>`;
}

// Initial + poll
fetchData();
setInterval(fetchData, POLL_MS);
document.addEventListener('visibilitychange', () => { if (!document.hidden) fetchData(); });
</script>
</body>
</html>
