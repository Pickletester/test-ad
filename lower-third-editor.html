<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lower Third Editor – Baseline BBG</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e02020;
    --card: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #888;
    --blue: #3b82f6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 16px 14px 60px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  header .logo {
    width: 38px; height: 38px;
    background: var(--red);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: #fff;
    font-family: Georgia, serif;
    flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; color: #fff; }
  header p  { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Token + save */
  .topbar {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .topbar input[type=password] {
    flex: 1;
    min-width: 180px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 10px;
    font-family: monospace;
  }
  .save-btn {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
  }
  .save-btn:disabled { opacity: .4; cursor: not-allowed; }
  .save-btn:hover:not(:disabled) { opacity: .85; }

  .status {
    font-size: 12px;
    margin: -4px 0 14px;
    min-height: 16px;
    color: var(--muted);
    text-align: center;
  }
  .status.ok  { color: #4caf50; }
  .status.err { color: var(--red); }

  .help {
    font-size: 11px;
    color: #666;
    padding: 10px 12px;
    background: #111;
    border: 1px solid #222;
    border-radius: 8px;
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .help b { color: #aaa; }

  /* Stage */
  .stage-wrap {
    margin-bottom: 14px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: #000;
  }
  .stage-label {
    background: #1a1a1a;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    padding: 7px 12px;
    text-transform: uppercase;
  }
  .stage {
    width: 100%;
    aspect-ratio: 2 / 1;
    background: #000;
    position: relative;
    overflow: hidden;
    touch-action: none;
  }

  /* Ad — same structure as the sign, scaled to fit */
  .ad {
    width: 800px;
    height: 400px;
    position: absolute;
    top: 0; left: 0;
    transform-origin: top left;
    display: flex;
    flex-direction: column;
    background: #000;
    font-family: 'Barlow Condensed', sans-serif;
    overflow: hidden;
  }

  #frameCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    filter: brightness(0.82) contrast(1.18) saturate(1.15);
  }
  .ad::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      transparent, transparent 2px,
      rgba(0,0,0,0.10) 2px, rgba(0,0,0,0.10) 3px);
    pointer-events: none;
    z-index: 100;
  }

  /* TOP PORTION — locked, identical to sign */
  .main-row { display: flex; flex: 1; min-height: 0; }

  .left {
    width: 390px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    position: relative;
    background: #000;
    z-index: 2;
  }
  .left::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 10% 50%, rgba(220,30,30,0.10) 0%, transparent 70%);
    pointer-events: none;
  }
  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #fff;
    line-height: 0.88;
    letter-spacing: 1px;
    text-shadow: 2px 3px 8px rgba(0,0,0,0.8);
    margin-bottom: 18px;
    white-space: nowrap;
    text-align: center;
  }
  .brand .amp {
    color: #e02020;
    text-shadow: 0 0 20px rgba(220,30,30,0.9), 0 0 50px rgba(220,30,30,0.4);
  }
  .inside-badge {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 12px 22px 12px 16px;
  }
  .inside-badge span {
    font-size: 21px;
    letter-spacing: 4px;
    color: #fff;
    text-transform: uppercase;
    font-weight: 700;
    border-right: 1px solid rgba(255,255,255,0.2);
    padding-right: 16px;
    white-space: nowrap;
  }
  .inside-badge img { height: 42px; width: auto; object-fit: contain; }

  .right { flex: 1; position: relative; overflow: hidden; background: #080000; }
  .right::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, #000 0%, rgba(0,0,0,0.55) 18%, rgba(0,0,0,0.15) 42%, transparent 65%);
    z-index: 2;
    pointer-events: none;
  }
  .ember {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(0deg, #000 0%, rgba(0,0,0,0.7) 40%, transparent 100%);
    z-index: 3;
    pointer-events: none;
  }
  .public-badge { position: absolute; top: 12px; right: 12px; z-index: 6; }
  .public-inner {
    border: 3px solid rgba(220,30,30,0.85);
    border-radius: 6px;
    padding: 12px 18px;
    background: rgba(0,0,0,0.72);
    box-shadow: 0 0 24px rgba(220,30,30,0.5), 0 0 60px rgba(220,30,30,0.2), inset 0 0 20px rgba(220,30,30,0.08);
    transform: rotate(-2deg);
    text-align: center;
  }
  .public-main {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1;
    text-shadow: 0 0 16px rgba(255,50,50,0.7), 0 0 40px rgba(255,50,50,0.3);
  }
  .public-main .accent { color: #ffe033; }

  /* LOWER THIRD — editable */
  .lower-third {
    flex-shrink: 0;
    height: 98px;
    background: #000;
    border-top: 2px solid #e02020;
    box-shadow: 0 -4px 20px rgba(220,30,30,0.35);
    position: relative;
  }

  .lt-canvas {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .lt-layer {
    position: absolute;
    white-space: pre;
    line-height: 1;
    cursor: move;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    touch-action: none;
    outline: 2px solid transparent;
    outline-offset: 2px;
    transition: outline-color 0.12s;
    padding: 2px;
    margin: -2px;
  }
  .lt-layer:hover    { outline-color: rgba(59,130,246,0.5); }
  .lt-layer.selected { outline-color: var(--blue); }
  .lt-layer.editing {
    outline-color: var(--red);
    outline-style: dashed;
    cursor: text;
    user-select: text;
    -webkit-user-select: text;
  }

  .lt-ticker {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 36px;
    background: #cc1a1a;
    display: flex;
    align-items: center;
    overflow: hidden;
    z-index: 2;
  }
  .lt-ticker.hidden { display: none; }
  .lt-ticker-inner {
    display: flex;
    align-items: center;
    white-space: nowrap;
    animation: ticker-scroll 30s linear infinite;
  }
  .lt-ticker-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 4px;
    color: #fff;
    padding: 0 60px;
  }
  @keyframes ticker-scroll {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  /* Properties panel */
  .props {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .props.hidden { display: none; }
  .props-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .props-title button {
    background: #222;
    border: 1px solid #552020;
    color: #ff6b6b;
    border-radius: 5px;
    padding: 5px 10px;
    font-size: 11px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .props-title button:hover { border-color: var(--red); color: #fff; background: var(--red); }

  .props textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 14px;
    padding: 9px 10px;
    font-family: 'Bebas Neue', monospace;
    letter-spacing: 1px;
    resize: vertical;
    min-height: 48px;
    margin-bottom: 10px;
  }
  .props textarea:focus { outline: none; border-color: var(--red); }

  .prop-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .prop {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .prop label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }
  .prop select, .prop input[type=number] {
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 9px;
    font-family: inherit;
  }
  .prop input[type=color] {
    width: 100%;
    height: 32px;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    padding: 2px;
  }

  /* Add button */
  .add-btn {
    width: 100%;
    background: none;
    border: 1px dashed #333;
    border-radius: 10px;
    color: #888;
    padding: 12px;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  .add-btn:hover { border-color: var(--red); color: var(--red); }

  /* Ticker editor */
  .ticker-editor {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .ticker-editor .th {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .ticker-editor label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-weight: 600;
  }
  .ticker-editor .toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #ddd; cursor: pointer;
  }
  .ticker-editor .toggle input { accent-color: var(--red); }
  .ticker-editor textarea {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 9px 10px;
    font-family: 'Bebas Neue', monospace;
    letter-spacing: 2px;
    min-height: 46px;
    resize: vertical;
  }
</style>
</head>
<body>

<header>
  <div class="logo">B</div>
  <div>
    <h1>Lower Third Editor</h1>
    <p>Only the area below the red line is editable · saves live to GitHub</p>
  </div>
</header>

<div class="topbar">
  <input type="password" id="ghToken" placeholder="ghp_... GitHub token" autocomplete="off">
  <button class="save-btn" id="saveBtn" onclick="save()">Save</button>
</div>
<div class="status" id="status"></div>

<div class="help">
  <b>Tap</b> a text to select · <b>drag</b> to move · <b>double-tap</b> to edit · pick font / size / color below
</div>

<!-- Live ad preview -->
<div class="stage-wrap">
  <div class="stage-label">Live Preview</div>
  <div class="stage" id="stage">
    <div class="ad" id="ad">

      <div class="main-row">
        <!-- LEFT (locked) -->
        <div class="left">
          <div class="brand">BASELINE<br>BAR <span class="amp">&amp;</span> GRILLE</div>
          <div class="inside-badge">
            <span>INSIDE</span>
            <img src="https://pickletester.github.io/test-ad/Logo%20LevelUP.png" alt="LevelUp">
          </div>
        </div>
        <!-- RIGHT (locked) -->
        <div class="right">
          <canvas id="frameCanvas"></canvas>
          <div class="ember"></div>
          <div class="public-badge">
            <div class="public-inner">
              <div class="public-main">OPEN<br>TO THE<br><span class="accent">PUBLIC</span></div>
            </div>
          </div>
        </div>
      </div>

      <!-- LOWER THIRD (editable) -->
      <div class="lower-third">
        <div class="lt-canvas" id="ltCanvas"></div>
        <div class="lt-ticker" id="ltTicker">
          <div class="lt-ticker-inner" id="ltTickerInner"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Properties panel (shown when layer selected) -->
<div class="props hidden" id="propsPanel">
  <div class="props-title">
    <span>Selected Text</span>
    <button onclick="deleteLayer()">Delete</button>
  </div>
  <textarea id="propText" placeholder="Enter text…" oninput="updateProp('text', this.value)"></textarea>
  <div class="prop-grid">
    <div class="prop">
      <label>Font</label>
      <select id="propFont" onchange="updateProp('fontFamily', this.value)">
        <option value="bebas">Bebas Neue</option>
        <option value="barlow">Barlow Condensed</option>
        <option value="serif">Serif</option>
        <option value="sans">Sans</option>
      </select>
    </div>
    <div class="prop">
      <label>Size</label>
      <input type="number" id="propSize" min="6" max="72" oninput="updateProp('fontSize', +this.value)">
    </div>
    <div class="prop">
      <label>Color</label>
      <input type="color" id="propColor" oninput="updateProp('color', this.value)">
    </div>
  </div>
</div>

<button class="add-btn" onclick="addText()">+ Add Text</button>

<!-- Ticker editor -->
<div class="ticker-editor">
  <div class="th">
    <label>Scrolling Ticker</label>
    <label class="toggle">
      <input type="checkbox" id="tickerEnabled" onchange="syncTicker()">
      Enabled
    </label>
  </div>
  <textarea id="tickerInput" placeholder="BINGO NIGHT • TRIVIA NIGHT • HAPPY HOUR 4–6PM" oninput="syncTicker()"></textarea>
</div>

<script>
const OWNER  = 'Pickletester';
const REPO   = 'test-ad';
const BRANCH = 'main';
const PATH   = 'lower-third.json';

/* ═══════════════════════════════════════════
   BURGER ANIMATION (preview)
═══════════════════════════════════════════ */
const BASE_URL    = 'https://pickletester.github.io/test-ad/Frames/';
const FRAME_COUNT = 145;
const FPS         = 18;
const INTERVAL_MS = 1000 / FPS;
const canvas = document.getElementById('frameCanvas');
const ctx    = canvas.getContext('2d');
function sizeCanvas() {
  const w = canvas.offsetWidth, h = canvas.offsetHeight;
  canvas.width  = w > 0 ? w : 410;
  canvas.height = h > 0 ? h : 300;
}
requestAnimationFrame(() => { sizeCanvas(); window.addEventListener('resize', sizeCanvas); startLoading(); });
function frameUrl(n) {
  return `${BASE_URL}Gen-4_5_-_burger_in_fire_gen-4_5_-_burger_in_fire__1__${String(n).padStart(3,'0')}.jpg`;
}
const frames = new Array(FRAME_COUNT).fill(null);
let loopStarted = false;
function startLoopIfNeeded() { if (!loopStarted && frames[0]) { loopStarted = true; requestAnimationFrame(tick); } }
function startLoading() {
  for (let i = 0; i < FRAME_COUNT; i++) {
    const img = new Image();
    img.onload  = () => { frames[i] = img; startLoopIfNeeded(); };
    img.onerror = () => { startLoopIfNeeded(); };
    img.src = frameUrl(i + 1);
  }
}
function drawFrame(img) {
  if (!img) return;
  const cw = canvas.width, ch = canvas.height;
  const iw = img.naturalWidth || 1, ih = img.naturalHeight || 1;
  const scale = Math.max(cw / iw, ch / ih);
  const dw = iw * scale, dh = ih * scale;
  ctx.clearRect(0, 0, cw, ch);
  ctx.drawImage(img, (cw - dw) / 2, (ch - dh) * 0.25, dw, dh);
}
let frameIdx = 0, lastTime = 0;
function tick(ts) {
  requestAnimationFrame(tick);
  if (ts - lastTime < INTERVAL_MS) return;
  lastTime = ts;
  let safeIdx = frameIdx;
  for (let i = 0; i < FRAME_COUNT; i++) {
    const idx = (frameIdx + i) % FRAME_COUNT;
    if (frames[idx]) { safeIdx = idx; break; }
  }
  drawFrame(frames[safeIdx]);
  frameIdx = (safeIdx + 1) % FRAME_COUNT;
}

/* ═══════════════════════════════════════════
   STAGE SCALING
═══════════════════════════════════════════ */
const stage = document.getElementById('stage');
const adEl  = document.getElementById('ad');
function fitStage() {
  const sw = stage.clientWidth;
  const sh = stage.clientHeight;
  const scale = Math.min(sw / 800, sh / 400);
  adEl.style.transform = `scale(${scale})`;
}
window.addEventListener('resize', fitStage);
setTimeout(fitStage, 30);
setTimeout(fitStage, 200);
new ResizeObserver(fitStage).observe(stage);

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
const DEFAULT_LAYERS = [
  { id: 'hoursLabel',   text: 'HOURS',                 x: 40,  y: 8,  fontFamily: 'barlow', fontSize: 10, color: '#e02020' },
  { id: 'hoursValue',   text: 'TUE – SAT  11AM – 10PM', x: 40,  y: 22, fontFamily: 'bebas',  fontSize: 24, color: '#ffffff' },
  { id: 'hhLabel',      text: 'HAPPY HOUR',            x: 290, y: 8,  fontFamily: 'barlow', fontSize: 10, color: '#e02020' },
  { id: 'hhValue',      text: 'TUE – FRI  4 – 6 PM',    x: 290, y: 22, fontFamily: 'bebas',  fontSize: 24, color: '#ffffff' },
  { id: 'tonightLabel', text: 'TONIGHT',               x: 540, y: 8,  fontFamily: 'barlow', fontSize: 10, color: '#e02020' },
  { id: 'tonightValue', text: 'TRIVIA NIGHT',          x: 540, y: 22, fontFamily: 'bebas',  fontSize: 24, color: '#ffffff' }
];

let state = {
  version: 2,
  layers: JSON.parse(JSON.stringify(DEFAULT_LAYERS)),
  ticker: { enabled: true, text: 'BINGO NIGHT  •  TRIVIA NIGHT  •  SPORTS NIGHT  •  HAPPY HOUR TUE–FRI 4–6PM  •  OPEN TO THE PUBLIC' }
};
let selectedId = null;

/* ═══════════════════════════════════════════
   LOAD
═══════════════════════════════════════════ */
async function loadFromGitHub() {
  try {
    const res = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/${BRANCH}/${PATH}?v=${Date.now()}`, { cache: 'no-store' });
    if (!res.ok) { renderAll(); return; }
    const data = await res.json();

    if (data.version === 2 && Array.isArray(data.layers)) {
      state.layers = data.layers;
      if (data.ticker) state.ticker = { enabled: data.ticker.enabled !== false, text: data.ticker.text || '' };
    } else {
      // Legacy migration
      const blocks = data.blocks || [
        { label: data.leftLabel,   value: data.leftValue   },
        { label: data.centerLabel, value: data.centerValue },
        { label: data.rightLabel,  value: data.rightValue  }
      ].filter(b => b && (b.label || b.value));

      if (blocks.length) {
        state.layers = [];
        const colX = [40, 290, 540, 640];
        blocks.forEach((b, i) => {
          const x = colX[i] ?? (40 + i * 170);
          state.layers.push({ id: 'l_'+i+'_label', text: b.label || '', x, y: 8,  fontFamily: 'barlow', fontSize: 10, color: '#e02020' });
          state.layers.push({ id: 'l_'+i+'_value', text: b.value || '', x, y: 22, fontFamily: 'bebas',  fontSize: 24, color: '#ffffff' });
        });
      }
      if (data.ticker) {
        const t = (typeof data.ticker === 'string') ? data.ticker : (data.ticker.text || '');
        state.ticker = { enabled: true, text: t };
      }
    }
  } catch(e) {}
  renderAll();
}

/* ═══════════════════════════════════════════
   RENDER
═══════════════════════════════════════════ */
const ltCanvas      = document.getElementById('ltCanvas');
const ltTicker      = document.getElementById('ltTicker');
const ltTickerInner = document.getElementById('ltTickerInner');
const tickerInput   = document.getElementById('tickerInput');
const tickerEnabled = document.getElementById('tickerEnabled');
const propsPanel    = document.getElementById('propsPanel');
const propText      = document.getElementById('propText');
const propFont      = document.getElementById('propFont');
const propSize      = document.getElementById('propSize');
const propColor     = document.getElementById('propColor');

function fontStack(f) {
  if (f === 'bebas')  return "'Bebas Neue', sans-serif";
  if (f === 'barlow') return "'Barlow Condensed', sans-serif";
  if (f === 'serif')  return "Georgia, serif";
  return "system-ui, sans-serif";
}
function letterSpacingFor(f) {
  if (f === 'bebas')  return 2;
  if (f === 'barlow') return 3;
  return 0;
}
function fontWeightFor(f) {
  if (f === 'barlow') return 700;
  return 400;
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderLayers() {
  ltCanvas.innerHTML = '';
  state.layers.forEach(l => {
    const div = document.createElement('div');
    div.className = 'lt-layer' + (l.id === selectedId ? ' selected' : '');
    div.dataset.id          = l.id;
    div.style.left          = (l.x || 0) + 'px';
    div.style.top           = (l.y || 0) + 'px';
    div.style.fontFamily    = fontStack(l.fontFamily);
    div.style.fontSize      = (l.fontSize || 20) + 'px';
    div.style.color         = l.color || '#ffffff';
    div.style.letterSpacing = letterSpacingFor(l.fontFamily) + 'px';
    div.style.fontWeight    = fontWeightFor(l.fontFamily);
    div.textContent         = l.text || ' ';
    attachLayerHandlers(div, l);
    ltCanvas.appendChild(div);
  });
}

function renderTicker() {
  const enabled = state.ticker.enabled && (state.ticker.text || '').trim();
  ltTicker.classList.toggle('hidden', !enabled);
  const t = state.ticker.text || '';
  ltTickerInner.innerHTML =
    `<span class="lt-ticker-text">${esc(t)}</span>` +
    `<span class="lt-ticker-text">${esc(t)}</span>`;
  tickerInput.value = t;
  tickerEnabled.checked = !!state.ticker.enabled;
}

function renderProps() {
  const l = state.layers.find(x => x.id === selectedId);
  if (!l) { propsPanel.classList.add('hidden'); return; }
  propsPanel.classList.remove('hidden');
  // Only update inputs if they're not focused (don't steal focus / overwrite typing)
  if (document.activeElement !== propText)  propText.value  = l.text || '';
  if (document.activeElement !== propFont)  propFont.value  = l.fontFamily || 'bebas';
  if (document.activeElement !== propSize)  propSize.value  = l.fontSize || 20;
  if (document.activeElement !== propColor) propColor.value = l.color || '#ffffff';
}

function renderAll() { renderLayers(); renderTicker(); renderProps(); }

/* ═══════════════════════════════════════════
   DRAG + SELECT + INLINE EDIT
═══════════════════════════════════════════ */
function selectLayer(id) {
  selectedId = id;
  renderLayers();
  renderProps();
}

function attachLayerHandlers(el, layer) {
  let dragState = null;
  let lastTap = 0;
  let moved = false;

  el.addEventListener('pointerdown', (e) => {
    if (el.classList.contains('editing')) return;
    e.preventDefault();
    e.stopPropagation();
    selectLayer(layer.id);
    el.setPointerCapture(e.pointerId);
    moved = false;
    const adRect = adEl.getBoundingClientRect();
    const scale  = adRect.width / 800;
    dragState = {
      startClientX: e.clientX,
      startClientY: e.clientY,
      startX: layer.x,
      startY: layer.y,
      scale
    };
  });

  el.addEventListener('pointermove', (e) => {
    if (!dragState) return;
    const dx = (e.clientX - dragState.startClientX) / dragState.scale;
    const dy = (e.clientY - dragState.startClientY) / dragState.scale;
    if (Math.abs(dx) > 1 || Math.abs(dy) > 1) moved = true;
    // Clamp inside lower-third (98px tall, 800px wide)
    const newX = Math.max(0, Math.min(790, Math.round(dragState.startX + dx)));
    const newY = Math.max(2, Math.min(94, Math.round(dragState.startY + dy)));
    layer.x = newX; layer.y = newY;
    el.style.left = newX + 'px';
    el.style.top  = newY + 'px';
  });

  el.addEventListener('pointerup', (e) => {
    if (!dragState) return;
    try { el.releasePointerCapture(e.pointerId); } catch(_){}
    dragState = null;
    const now = Date.now();
    if (!moved && now - lastTap < 350) {
      enterEditMode(el, layer);
    }
    lastTap = moved ? 0 : now;
  });

  el.addEventListener('dblclick', (e) => {
    e.preventDefault();
    enterEditMode(el, layer);
  });
}

function enterEditMode(el, layer) {
  if (el.classList.contains('editing')) return;
  el.classList.add('editing');
  el.contentEditable = 'true';
  el.focus();
  // Select all
  const r = document.createRange();
  r.selectNodeContents(el);
  const s = window.getSelection();
  s.removeAllRanges(); s.addRange(r);

  const finish = (save) => {
    el.contentEditable = 'false';
    el.classList.remove('editing');
    if (save) {
      layer.text = el.innerText.replace(/\n+$/, '');
    }
    el.textContent = layer.text || ' ';
    renderProps();
  };

  el.addEventListener('blur', () => finish(true), { once: true });
  el.addEventListener('keydown', function onKey(e) {
    if (e.key === 'Escape') { e.preventDefault(); el.removeEventListener('keydown', onKey); finish(false); el.blur(); }
    if (e.key === 'Enter')  { e.preventDefault(); el.removeEventListener('keydown', onKey); finish(true);  el.blur(); }
  });
}

// Click outside → deselect
document.getElementById('stage').addEventListener('pointerdown', (e) => {
  if (e.target.closest('.lt-layer')) return;
  selectedId = null;
  renderLayers();
  renderProps();
});

/* ═══════════════════════════════════════════
   PROPERTY UPDATES
═══════════════════════════════════════════ */
function updateProp(key, value) {
  const l = state.layers.find(x => x.id === selectedId);
  if (!l) return;
  l[key] = value;
  renderLayers();
}

function addText() {
  const id = 't_' + Date.now().toString(36);
  state.layers.push({
    id, text: 'NEW TEXT',
    x: 300, y: 40,
    fontFamily: 'bebas', fontSize: 24, color: '#ffffff'
  });
  selectedId = id;
  renderAll();
}

function deleteLayer() {
  if (!selectedId) return;
  state.layers = state.layers.filter(x => x.id !== selectedId);
  selectedId = null;
  renderAll();
}

// Arrow-key nudging (when nothing focused)
document.addEventListener('keydown', (e) => {
  if (!selectedId) return;
  const tag = (document.activeElement && document.activeElement.tagName) || '';
  if (['INPUT','TEXTAREA','SELECT'].includes(tag)) return;
  if (document.activeElement && document.activeElement.isContentEditable) return;
  const l = state.layers.find(x => x.id === selectedId);
  if (!l) return;
  if (e.key === 'Delete' || e.key === 'Backspace') { e.preventDefault(); deleteLayer(); return; }
  if (e.key === 'ArrowLeft')  { l.x = Math.max(0,   l.x - 1); renderLayers(); }
  if (e.key === 'ArrowRight') { l.x = Math.min(790, l.x + 1); renderLayers(); }
  if (e.key === 'ArrowUp')    { l.y = Math.max(2,   l.y - 1); renderLayers(); }
  if (e.key === 'ArrowDown')  { l.y = Math.min(94,  l.y + 1); renderLayers(); }
});

/* ═══════════════════════════════════════════
   TICKER
═══════════════════════════════════════════ */
function syncTicker() {
  state.ticker.enabled = tickerEnabled.checked;
  state.ticker.text    = tickerInput.value;
  renderTicker();
}

/* ═══════════════════════════════════════════
   SAVE
═══════════════════════════════════════════ */
async function save() {
  const token = document.getElementById('ghToken').value.trim();
  if (!token) return setStatus('Enter your GitHub token first.', 'err');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  setStatus('Saving…', '');

  const payload = {
    version: 2,
    layers: state.layers,
    ticker: state.ticker
  };

  try {
    const meta = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    let sha;
    if (meta.ok) { const j = await meta.json(); sha = j.sha; }
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
    const body = { message: 'update lower third', content, branch: BRANCH };
    if (sha) body.sha = sha;
    const put = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${PATH}`, {
      method: 'PUT',
      headers: { Authorization: `Bearer ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!put.ok) { const e = await put.json(); throw new Error(e.message || put.status); }
    setStatus('✓ Saved! Sign updates within 30s.', 'ok');
  } catch(e) {
    setStatus('Save failed: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls || '');
}

/* ═══════════════════════════════════════════
   TOKEN + INIT
═══════════════════════════════════════════ */
const tokenEl = document.getElementById('ghToken');
const savedToken = localStorage.getItem('bbg_gh_token');
if (savedToken) tokenEl.value = savedToken;
tokenEl.addEventListener('change', e => localStorage.setItem('bbg_gh_token', e.target.value));

loadFromGitHub();
</script>
